# Nginx reverse proxy — routes one ngrok URL to 3 local Streamlit apps
#
# Ports:
#   8501 → /app1 (enterpriseRAG)
#   8502 → /app2 (future project 2)
#   8503 → /app3 (future project 3)
#
# Start Nginx:
#   nginx -c "$(pwd)/deploy/local/nginx.conf" -p "$(pwd)/deploy/local"
#
# Stop Nginx:
#   nginx -c "$(pwd)/deploy/local/nginx.conf" -p "$(pwd)/deploy/local" -s stop
#
# Expose:  ngrok http 8080
# Access:
#   https://<ngrok>/app1/
#   https://<ngrok>/app2/
#   https://<ngrok>/app3/

worker_processes 1;

# Write pid and logs to deploy/local/ so no root access needed
pid         deploy/local/nginx.pid;
error_log   deploy/local/nginx_error.log warn;

events {
    worker_connections 64;
}

http {
    access_log deploy/local/nginx_access.log;

    # Required for Streamlit WebSocket (/_stcore/stream)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;
        server_name localhost;

        # ---- App 1: Enterprise RAG ----
        location /app1/ {
            proxy_pass         http://localhost:8501/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ---- App 2: Project 2 (placeholder) ----
        location /app2/ {
            proxy_pass         http://localhost:8502/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ---- App 3: Project 3 (placeholder) ----
        location /app3/ {
            proxy_pass         http://localhost:8503/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Landing page
        location = / {
            return 200 '<html><body style="font-family:sans-serif;max-width:500px;margin:4rem auto"><h2>Demo Apps</h2><ul><li><a href="/app1/">App 1 — Enterprise RAG</a></li><li><a href="/app2/">App 2 — (coming soon)</a></li><li><a href="/app3/">App 3 — (coming soon)</a></li></ul></body></html>';
            add_header Content-Type text/html;
        }
    }
}
